
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> <!-- Permite usar acentos, ç, emojis e caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site funcionar corretamente em celulares -->
    <!-- Ajusta o tamanho da página conforme a tela -->

    <title>Validador de CPF</title>

    <style>

        /* estilização do corpo*/
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        /* Centraliza o título */
        h1{
            text-align: center;
        }

        /* Caixa principal */
        .container{
            max-width: 400px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        /* Campo do formulário */
        .form-content{
            display: flex; /* Os itens se tornam flexíveis, permitindo alinhamento horizontal ou vertical fácil, distribuição de espaço e ordem. */ 
            flex-direction: column;
        }

        /* Campo da entrada de dados */
        input{
            padding: 10px;
            margin-top: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        /* Botão */
        button{
            margin-top: 15px;
            padding: 10px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Mensagem paara o usuario*/
        .message{
            margin-top: 15px;
            font-weight: bold;
        }

        /* CPF válido */
        .success{
            color: green;
        }

        /* CPF inválido */
        .error{
            color: red;
        }

    </style>
</head>

<body>

    <h1>Validador de CPF</h1>

    <div class="container">

        <!-- Formulário -->
        <form id="form-cpf">

            <div class="form-content">

                <!-- Texto -->
                <label for="cpf">Digite seu CPF:</label>

                <!-- Campo de entrada -->
                <input 
                    type="text" 
                    id="cpf"
                    placeholder="000.000.000-00"
                >

                <!-- Botão -->
                <button type="submit">
                    Validar CPF
                </button>

                <!-- Área onde aparecerá a mensagem -->
                <p id="message" class="message"></p>

            </div>

        </form>

    </div>

    <script>

        // pega o formulário do HTML
        const form = document.getElementById("form-cpf");

        // pega o input do CPF
        const cpfInput = document.getElementById("cpf");

        // pega o elemento onde a mensagem será exibida
        const message = document.getElementById("message");


        // quando o formulário for enviado
        form.addEventListener("submit", function(event){

            // impede o recarregamento da página
            event.preventDefault();


            // pega o valor digitado
            let cpf = cpfInput.value;


            // remove pontos, traços e tudo que não for número
            cpf = cpf.replace(/\D/g, "");


            // verifica se o CPF possui 11 dígitos
            if(cpf.length !== 11){

                mostrarMensagem("CPF inválido! Deve conter 11 números.", false);

                return;
            }


            // verifica se todos os números são iguais
            // exemplo: 11111111111
            if(/^(\d)\1+$/.test(cpf)){

                mostrarMensagem("CPF inválido!", false);

                return;
            }


            // =========================
            // VALIDAÇÃO DO PRIMEIRO DÍGITO
            // =========================

            let soma = 0;

            // percorre os 9 primeiros números
            for(let i = 0; i < 9; i++){

                // multiplica cada número pelo peso regressivo
                soma += parseInt(cpf[i]) * (10 - i);
            }


            // calcula o primeiro dígito
            let primeiroDigito = (soma * 10) % 11;

            // se der 10, vira 0
            if(primeiroDigito === 10){
                primeiroDigito = 0;
            }


            // verifica se o dígito calculado é igual ao digitado
            if(primeiroDigito !== parseInt(cpf[9])){

                mostrarMensagem("CPF inválido!", false);

                return;
            }


            // =========================
            // VALIDAÇÃO DO SEGUNDO DÍGITO
            // =========================

            soma = 0;

            // percorre os 10 primeiros números
            for(let i = 0; i < 10; i++){

                // multiplica pelos pesos de 11 até 2
                soma += parseInt(cpf[i]) * (11 - i);
            }


            // calcula segundo dígito
            let segundoDigito = (soma * 10) % 11;

            // se der 10, vira 0
            if(segundoDigito === 10){
                segundoDigito = 0;
            }


            // verifica se o segundo dígito está correto
            if(segundoDigito !== parseInt(cpf[10])){

                mostrarMensagem("CPF inválido!", false);

                return;
            }


            // se passou em todas as verificações
            mostrarMensagem("CPF válido!", true);

        });



        // função responsável por mostrar mensagem
        function mostrarMensagem(texto, sucesso){

            // altera o texto da mensagem
            message.innerText = texto;


            // remove classes anteriores
            message.classList.remove("success");
            message.classList.remove("error");


            // se for verdadeiro
            if(sucesso){

                // adiciona classe verde
                message.classList.add("success");

            }else{

                // adiciona classe vermelha
                message.classList.add("error");
            }
        }

    </script>

</body>
</html>
